services:
  php-devcontainer:
    image: mongodb-bundle-php:${PHP_VERSION:-7.4}-${MONGODB_EXTENSION_VERSION:-1.6.0}
    build:
      context: ../docker
      args:
        PHP_VERSION: ${PHP_VERSION:-7.4}
        MONGODB_EXTENSION_VERSION: ${MONGODB_EXTENSION_VERSION:-1.6.0}
    volumes:
        - ../:/home/user-dev/project
